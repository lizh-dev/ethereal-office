<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640">
  <!-- Floor -->
  <rect width="1200" height="640" fill="#f5f0e8"/>
  <!-- Wood floor pattern -->
  <g opacity="0.15">
    <rect x="0" y="0" width="1200" height="40" fill="#d4a76a" rx="2"/>
    <rect x="0" y="42" width="1200" height="40" fill="#c49a5e" rx="2"/>
    <rect x="0" y="84" width="1200" height="40" fill="#d4a76a" rx="2"/>
    <rect x="0" y="126" width="1200" height="40" fill="#c49a5e" rx="2"/>
    <rect x="0" y="168" width="1200" height="40" fill="#d4a76a" rx="2"/>
    <rect x="0" y="210" width="1200" height="40" fill="#c49a5e" rx="2"/>
    <rect x="0" y="252" width="1200" height="40" fill="#d4a76a" rx="2"/>
    <rect x="0" y="294" width="1200" height="40" fill="#c49a5e" rx="2"/>
    <rect x="0" y="336" width="1200" height="40" fill="#d4a76a" rx="2"/>
    <rect x="0" y="378" width="1200" height="40" fill="#c49a5e" rx="2"/>
    <rect x="0" y="420" width="1200" height="40" fill="#d4a76a" rx="2"/>
    <rect x="0" y="462" width="1200" height="40" fill="#c49a5e" rx="2"/>
    <rect x="0" y="504" width="1200" height="40" fill="#d4a76a" rx="2"/>
    <rect x="0" y="546" width="1200" height="40" fill="#c49a5e" rx="2"/>
    <rect x="0" y="588" width="1200" height="40" fill="#d4a76a" rx="2"/>
  </g>
  <!-- Walls -->
  <rect x="20" y="20" width="1160" height="600" fill="none" stroke="#8b7355" stroke-width="8" rx="4"/>
  <!-- Room dividers -->
  <line x1="750" y1="20" x2="750" y2="400" stroke="#8b7355" stroke-width="6"/>
  <line x1="750" y1="400" x2="1180" y2="400" stroke="#8b7355" stroke-width="6"/>
  <!-- Windows (top wall) -->
  <rect x="100" y="20" width="120" height="8" fill="#87ceeb" opacity="0.6" rx="2"/>
  <rect x="280" y="20" width="120" height="8" fill="#87ceeb" opacity="0.6" rx="2"/>
  <rect x="460" y="20" width="120" height="8" fill="#87ceeb" opacity="0.6" rx="2"/>
  <rect x="820" y="20" width="100" height="8" fill="#87ceeb" opacity="0.6" rx="2"/>
  <rect x="980" y="20" width="100" height="8" fill="#87ceeb" opacity="0.6" rx="2"/>
  <!-- Door -->
  <rect x="650" y="612" width="80" height="8" fill="#a0522d" rx="2"/>
  <!-- Room labels (subtle) -->
  <text x="350" y="50" font-family="sans-serif" font-size="14" fill="#8b7355" opacity="0.5" text-anchor="middle">ワークスペース</text>
  <text x="950" y="50" font-family="sans-serif" font-size="14" fill="#8b7355" opacity="0.5" text-anchor="middle">会議室</text>
  <text x="950" y="430" font-family="sans-serif" font-size="14" fill="#8b7355" opacity="0.5" text-anchor="middle">ラウンジ</text>
  <!-- Subtle rug in lounge -->
  <rect x="800" y="440" width="330" height="150" fill="#d4a76a" opacity="0.1" rx="8"/>
  <!-- Plant decorations -->
  <circle cx="40" cy="40" r="12" fill="#6b8e5a" opacity="0.3"/>
  <circle cx="1160" cy="40" r="12" fill="#6b8e5a" opacity="0.3"/>
  <circle cx="40" cy="600" r="12" fill="#6b8e5a" opacity="0.3"/>
  <circle cx="1160" cy="600" r="12" fill="#6b8e5a" opacity="0.3"/>
</svg>
